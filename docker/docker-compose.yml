services:
  activiti-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: activiti
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # Kein Volume = frische DB bei jedem Start!
    # tmpfs sorgt dafuer, dass die DB nur im RAM lebt
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  activiti:
    build: .
    image: activiti6:latest
    ports:
      - "${ACTIVITI_PORT:-9090}:8080"
    depends_on:
      activiti-db:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-Xmx512m"
